# CodeRabbit configuration for forge-gpu
# Docs: https://docs.coderabbit.ai/guides/configure-coderabbit

language: en-US
early_access: false
reviews:
  # Request changes for issues that require fixes
  request_changes_workflow: true

  # Be more strict - review everything
  high_level_summary: true
  poem: false  # Skip the poem for cleaner output
  review_status: true

  # Collapse finished touches to reduce noise
  collapse_walkthrough: false

  # Exclude non-reviewable content from diffs
  path_filters:
    # Compiled shader bytecode — binary blobs, no reviewable content
    - "!**/shaders/compiled/**"
    # Compiled shader binaries (spv/dxil loose files)
    - "!**/*.spv"
    - "!**/*.dxil"
    # Third-party vendored code
    - "!third_party/**"
    # Internal planning docs (working notes, not published content)
    - "!**/PLAN.md"

  # Review configuration
  auto_review:
    enabled: true
    auto_incremental_review: true
    ignore_title_keywords: []
    # Pause after the first review so we can batch-fix all feedback locally
    # and push once, instead of whack-a-mole with incremental re-reviews
    auto_pause_after_reviewed_commits: 1

  # Path-specific configuration
  path_instructions:
    - path: "lessons/**/*.c"
      instructions: |
        - Verify SDL3 API usage follows best practices
        - Check for proper error handling on all SDL calls
        - Ensure memory management is correct (SDL_calloc/SDL_free)
        - Flag any magic numbers that should be #define constants
        - Do NOT suggest renaming typedefs to snake_case. This project uses
          PascalCase for typedefs (e.g. Vertex, Uniforms, GpuPrimitive,
          GridVertUniforms, ModelData) and snake_case only for local variables
          and the app_state struct. This is intentional and consistent across
          all lessons.

    - path: "lessons/**/*.hlsl"
      instructions: |
        - Verify shader inputs/outputs match SDL GPU conventions
        - Check uniform buffer layouts follow std140 rules
        - Ensure register bindings match SDL GPU model

    - path: "lessons/**/README.md"
      instructions: |
        - Check for all required sections (What you'll learn, Result, Key concepts, Building, Exercises)
        - Verify code blocks have language tags
        - Ensure technical accuracy of explanations

    - path: "scripts/forge_diagrams/**"
      instructions: |
        - Focus on CORRECTNESS: math accuracy, visual-to-text consistency,
          axis labels, coordinate systems, and whether the diagram matches
          what the lesson README describes
        - Verify plotted geometry matches the documented equations
        - Check that annotations and labels are technically accurate
        - Skip style nits (color choices, font sizes, spacing tweaks) —
          these follow a project-wide STYLE dict
        - Skip Python style — Ruff handles that separately

    - path: ".claude/skills/**"
      instructions: |
        - These are AI-invokable skill documents, not production code
        - Only flag technical inaccuracies in code examples (wrong API
          signatures, missing error handling patterns, incorrect SDL GPU usage)
        - Skip prose style, markdown formatting, and structural suggestions

    - path: ".github/workflows/*.yml"
      instructions: |
        - Check for security issues (token exposure, untrusted input)
        - Verify permissions are minimal and scoped correctly
        - Flag any workflows that could be abused

chat:
  auto_reply: true

# Tone and style
tone_instructions: |
  - Be constructive and educational
  - Prioritize security and correctness over style
  - Explain *why* a change is suggested, not just *what*
  - Use severity markers: Major for bugs/security, Minor for style/docs
  - Group related feedback when possible
